<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App | お天気アプリ</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <h1>Weather App / お天気アプリ</h1>

    <div class="search">
      <input type="text" id="city-input" placeholder="Enter city name... (例: Tokyo)">
      <button id="search-btn">Search / 検索</button>
    </div>

    <div class="weather-card" id="weather-card">
      <h2 id="city-name">--</h2>
      <div id="weather-icon"></div> <p id="temperature" class="temp">--°C</p>
      <p id="description">--</p>
      
      <div class="details">
        <p id="humidity">Humidity / 湿度: --%</p>
        <p id="wind-speed">Wind / 風速: -- m/s</p>
      </div>
    </div>

    <p id="error-msg" class="error"></p>
    
    <a href="index.html" class="back-link">← Back to Portfolio</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
